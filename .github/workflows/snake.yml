name: Generate Snake Contribution Animation

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: olucasjard
          outputs: |
            dist/snake.svg?palette=000000,1a1a1a,262626,D4AF37,FF4500
            dist/snake-dark.svg?palette=000000,1a1a1a,262626,D4AF37,FF4500

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
